# nixpacks.toml
[phases.setup]
  nixPkgs = ['nodejs', 'libatomic1']   # ← this installs libatomic1

[phases.build]
  dependsOn = ['setup']
  cmds = [
    'composer install --no-interaction --prefer-dist --optimize-autoloader',
    'npm ci',                           # or npm install
    'npm run build'                     # or npm run dev / prod depending on your setup
  ]

[start]
  cmd = 'php artisan serve --host 0.0.0.0 --port $PORT'